:root{
  --ink:#1a1a1a;--muted:#565656;--faint:#8b8b8b;--line:#e5e5e5;--line2:#efefef;
  --green:#2f8659;--yellow:#fef325;--chat:#f6d200;--bg:#f6f7f9;--card:#fff;--black:#000;
  --san:'Open Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--san);color:var(--ink);background:var(--card);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
/* prototype strip (my control — not part of the real UI) */
.protobar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:#1b1533;color:#e8e3ff;font-family:var(--mono);font-size:12px;padding:7px 16px}
.protobar .lbl b{color:#c9b8ff}
.toggle{display:inline-flex;background:rgba(255,255,255,.12);border-radius:999px;padding:3px;gap:2px}
.toggle button{border:0;background:transparent;color:#cfc8e8;font-family:var(--mono);font-size:12px;font-weight:700;padding:6px 13px;border-radius:999px;cursor:pointer}
.toggle button.on.broken{background:#c0392b;color:#fff}
.toggle button.on.fixed{background:#2f8659;color:#fff}
/* real nav */
header.nav{background:var(--black);padding:16px 26px}
header.nav img{height:40px;display:block}
/* app area */
#app{min-height:60vh}
#app.gray{background:var(--bg)}
/* REGISTER: hero + form */
.reg-stage{display:grid;grid-template-columns:minmax(0,49.5%) 1fr}
.hero{position:relative;background:#0c0c0c}
.hero img{display:block;width:100%;height:100%;object-fit:cover;object-position:top left}
.reg-right{display:flex;justify-content:center;padding:34px 22px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 12px 30px rgba(20,20,30,.05)}
.card.auth{max-width:500px;width:100%;padding:26px 40px 34px}
.tabs{display:flex;justify-content:center;margin-bottom:6px}
.tabs .tk{background:#efefef;border-radius:999px;padding:5px;display:inline-flex}
.tabs button{border:0;background:transparent;padding:9px 30px;border-radius:999px;font-family:inherit;font-size:15px;font-weight:600;color:#5b5b5b;cursor:pointer}
.tabs button.on{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.14)}
h1.h{font-size:23px;font-weight:700;text-align:center;margin:16px 0 3px;color:#1a1a1a}
.sub{text-align:center;color:var(--muted);font-size:14px;margin:0 0 20px}
.sub mark{background:var(--yellow);color:#1a1a1a;padding:0 3px;border-radius:2px}
.gbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:1px solid #dcdcdc;border-radius:999px;padding:13px;font-family:inherit;font-size:15px;font-weight:600;color:#2b2b2b;cursor:pointer}
.gbtn .g{font-weight:700;color:#4285F4}
.or{display:flex;align-items:center;gap:12px;color:#9a9a9a;font-size:13px;margin:18px 0}
.or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}
.lab{display:block;color:#565656;font-size:14px;margin:16px 0 6px}
.lab .req{color:#c0392b}.lab .opt{color:#a2a2a2}
.field,.sel{width:100%;min-width:0;border:1px solid var(--line);border-radius:8px;padding:13px 13px;font-family:inherit;font-size:15px;color:#1a1a1a;background:#fff}
.field:focus,.sel:focus{outline:2px solid #b9d9c8;outline-offset:1px;border-color:var(--green)}
.field.bad,.sel.bad{border-color:#c0392b;background:#fdf0ee}
.two{display:flex;gap:14px}.two>*{flex:1;min-width:0}
.ferr{color:#c0392b;font-size:13px;margin-top:6px;display:flex;gap:6px;align-items:flex-start}
.primary{width:100%;background:var(--black);color:#fff;border:0;border-radius:999px;padding:15px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;margin-top:22px}
.primary:hover{opacity:.9}
.primary.auto{width:auto;padding:14px 34px;display:block;margin-left:auto}
.ret{text-align:center;font-size:14px;font-weight:700;color:#1a1a1a;margin-top:16px}
.ret a,.lk{color:var(--green);text-decoration:underline;cursor:pointer}
.consent{display:flex;gap:10px;font-size:13px;color:#3a3a3a;margin-top:18px;line-height:1.55}
.consent .cb{flex:0 0 18px;height:18px;border:1.5px solid #1a1a1a;border-radius:4px;display:grid;place-items:center;font-size:12px;background:#000;color:#fff}
/* INNER steps chrome */
.progband{background:#f1f1f1;color:#1a1a1a;font-size:15px;padding:13px 26px}
.progband .ed{color:#8a8a8a;margin-left:6px;cursor:pointer}
.verifyband{background:#fffbe6;border-bottom:1px solid #f2e7b8;color:#c8890a;font-size:14px;padding:11px 26px;text-align:center}
.verifyband a{color:#c8890a;text-decoration:underline;cursor:pointer}
.inner{display:grid;grid-template-columns:300px 1fr;gap:26px;max-width:1160px;margin:0 auto;padding:30px 22px 60px}
.inner>*{min-width:0}
.stepper{padding-top:12px}
.stp{display:flex;align-items:center;gap:13px;position:relative;padding:10px 0}
.stp .c{flex:none;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:700;border:2px solid #cfcfcf;color:#9a9a9a;background:#fff;z-index:2}
.stp.active .c{border-color:#000;color:#000}
.stp.done .c{background:#000;border-color:#000;color:#fff}
.stp .t{font-size:15px;color:#9a9a9a}
.stp.active .t{color:#111;font-weight:700}.stp.done .t{color:#111}
.stp:not(:last-child)::after{content:"";position:absolute;left:14px;top:34px;width:2px;height:20px;background:#d8d8d8;z-index:1}
.card.step{padding:34px 38px}
h2.h2{font-size:26px;font-weight:700;margin:0 0 4px}
/* identity slots */
.slot{border:1.6px dashed #d3d3d3;border-radius:10px;padding:16px;text-align:center;color:#8a8a8a;font-size:14px;cursor:pointer;background:#fbfbfb}
.slot:hover{border-color:var(--green)}
.slot.ok{border-style:solid;border-color:var(--green);background:#eef7f1;color:#2f8659;cursor:default}
.slot small{display:block;color:#9a9a9a;margin-top:3px}.slot.ok small{color:#2f8659}
.hint{font-size:13px;color:#4a4a4a;background:#f2f2f2;border-radius:8px;padding:10px 12px;margin-top:8px}
.hint.ok{background:#eef7f1;color:#2f8659}
/* checkout */
.sumrow{display:flex;justify-content:space-between;font-size:15px;padding:10px 0;border-bottom:1px solid var(--line2)}
.sumrow.big{font-size:20px;font-weight:700;border-bottom:0}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.pill{border:1px solid var(--line);border-radius:8px;padding:10px 13px;font-size:14px;cursor:pointer;background:#fff}
.pill.sel{border-color:#000;background:#f3f3f3;font-weight:700}
.banknote{font-size:13px;color:#4a4a4a;background:#fafafa;border:1px solid var(--line);border-radius:9px;padding:12px;margin-top:10px;line-height:1.6}
.cvcwrap{position:relative}
/* yes/no */
.yn{display:inline-flex;gap:8px;margin-top:6px}.yn .pill{padding:8px 20px}
/* chat bubble (real) */
.chat{position:fixed;right:18px;bottom:20px;width:52px;height:52px;border-radius:14px;background:var(--chat);display:grid;place-items:center;font-size:22px;box-shadow:0 6px 18px rgba(0,0,0,.18);z-index:40}
/* toast */
.toast{position:fixed;top:52px;right:14px;max-width:330px;background:#c0392b;color:#fff;padding:12px 14px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:70;display:flex;gap:10px;align-items:flex-start;animation:sl .22s ease}
@keyframes sl{from{transform:translateY(-8px);opacity:0}to{transform:none;opacity:1}}
.toast.ok{background:#2f8659}.toast .x{cursor:pointer;opacity:.85}
/* prototype annotation note (clearly separate from the UI) */
.note{max-width:1160px;margin:0 auto;padding:0 22px}
.note .inner-note{border:1px dashed #c9b8ff;background:#f6f3ff;border-radius:10px;padding:12px 15px;font-size:13px;color:#4a3d7a;margin-bottom:22px}
.note .inner-note.brk{border-color:#e6b3ac;background:#fbf0ee;color:#7a2b20}
.note .inner-note .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;display:block;margin-bottom:4px;opacity:.8}
.note .inner-note b{color:inherit}
.pixel{font-family:var(--mono);font-size:11.5px;color:#8a8a8a;text-align:center;margin-top:12px}
.pixel .bad{color:#c0392b}.pixel .ok{color:#2f8659}
/* footer (real) */
footer .help{text-align:center;padding:26px 16px 10px;font-size:15px;color:#1a1a1a}
footer .help b{font-weight:700}
footer .icons{display:flex;gap:12px;justify-content:center;padding:6px 0 24px}
footer .icons span{width:44px;height:44px;border-radius:50%;background:#7b7f88;color:#fff;display:grid;place-items:center;font-size:16px}
footer .barf{background:#000;color:#cfcfcf;text-align:center;padding:20px;font-size:13px}
footer .barf img{height:34px;margin-bottom:8px}
footer .barf a{color:#fff;text-decoration:underline}
.done-wrap{max-width:500px;margin:0 auto;padding:40px 22px 60px}
.done .big{font-size:52px;text-align:center}
.replay{display:block;text-align:center;margin-top:16px;color:var(--green);text-decoration:underline;cursor:pointer}
.welcome{background:#eef7f1;border:1px solid #bfe0cd;border-radius:10px;padding:13px;font-size:14px;color:#245f42;margin-bottom:4px}
/* RESPONSIVE — match the real mobile layout */
@media(max-width:820px){
  .reg-stage{grid-template-columns:1fr}
  .hero{display:none}
  .reg-right{padding:20px 16px 50px}
  .card.auth{padding:22px 20px 28px}
  header.nav{padding:14px 18px}
  .inner{grid-template-columns:1fr;gap:0;padding:0 14px 50px}
  .stepper{display:flex;justify-content:space-between;gap:6px;padding:16px 4px 6px;overflow-x:auto}
  .stp{flex-direction:column;text-align:center;gap:6px;padding:4px}
  .stp:not(:last-child)::after{display:none}
  .stp .t{font-size:11px;max-width:74px}
  .card.step{padding:22px 18px}
  .progband,.verifyband{padding-left:16px;padding-right:16px;font-size:13.5px}
  .primary.auto{width:100%;padding:15px}
  h2.h2{font-size:22px}
}
</style>

const params=new URLSearchParams(location.search);
const INNER=['education','personal','identity','checkout'];
const STEPLABELS=['Previous education','Personal information','Identity documents','Application fee checkout'];
const S={
  mode: params.get('mode')==='broken'?'broken':'fixed',
  step: params.get('step')||'register',
  data:{name:'',last:'',email:'',cc:'UA',phone:'',city:'',prog:'MBA'},
  front:false,back:false,pay:null,
};
const $=s=>document.querySelector(s);
function toast(m,ok){const t=document.createElement('div');t.className='toast'+(ok?' ok':'');t.innerHTML=`<span>${m}</span><span class="x">✕</span>`;document.body.appendChild(t);t.querySelector('.x').onclick=()=>t.remove();setTimeout(()=>t.remove(),4200);}
function go(k){S.step=k;render();scrollTo(0,0);}
const COUNTRIES=[{c:'NG',d:'+234',n:'Nigeria',ok:true},{c:'GH',d:'+233',n:'Ghana',ok:true},{c:'KE',d:'+254',n:'Kenya',ok:true},{c:'ZA',d:'+27',n:'South Africa',ok:true},{c:'US',d:'+1',n:'United States',ok:true},{c:'GB',d:'+44',n:'United Kingdom',ok:true},{c:'UA',d:'+380',n:'Ukraine',ok:false}];
function note(html){const brk=S.mode==='broken';return `<div class="note"><div class="inner-note ${brk?'brk':''}"><span class="tag">Prototype note · ${brk?'Broken today':'What we fixed'}</span>${html}</div></div>`;}

/* stepper for inner steps */
function stepper(cur){
  const ci=INNER.indexOf(cur);
  return `<aside class="stepper">${STEPLABELS.map((l,i)=>{
    const st=i<ci?'done':(i===ci?'active':'');
    return `<div class="stp ${st}"><span class="c">${i<ci?'✓':(i+1)}</span><span class="t">${l}</span></div>`;
  }).join('')}</aside>`;
}
function innerChrome(cur,cardHtml,noteHtml){
  return `<div class="progband">Degree: Master of Business Administration (MBA) <span class="ed">✎</span></div>
    <div class="verifyband">📱 ${COUNTRIES.find(c=>c.c===S.data.cc).d} ${S.data.phone||'803 123 4567'} not verified &nbsp;–&nbsp; <a>Verify now</a></div>
    ${noteHtml||''}
    <div class="inner">${stepper(cur)}<div class="card step">${cardHtml}</div></div>`;
}
function setChat(mode){ // mode: 'corner' | 'hide'
  const c=$('#chat'); if(!c)return; c.className='chat'; c.style.display = mode==='hide'?'none':'grid';
}

/* ---------- REGISTER ---------- */
function register(){
  const b=S.mode==='broken';
  const opts=COUNTRIES.map(c=>{const dis=(!b&&!c.ok)?'disabled':'';const flag=(!b&&!c.ok)?'⛔ ':'';return `<option value="${c.c}" ${dis} ${S.data.cc===c.c?'selected':''}>${flag}${c.n} ${c.d}</option>`;}).join('');
  const req=b?'':' <span class="req">*</span>';
  $('#app').className='';
  $('#app').innerHTML=`<div class="reg-stage">
    <div class="hero"><img src="${HERO}" alt="Welcome to ApplyNXU"></div>
    <div class="reg-right"><div class="card auth">
      <div class="tabs"><div class="tk"><button>Login</button><button class="on">Register</button></div></div>
      <h1 class="h">Start your education journey</h1>
      <p class="sub">Less than <mark>10 minutes</mark> to apply</p>
      <button class="gbtn" id="google"><span class="g">G</span> Continue with Google</button>
      <div class="or">OR</div>
      <div class="two"><div><label class="lab">First Name${req}</label><input class="field" id="f_name" value="${S.data.name}"></div>
        <div><label class="lab">Last Name${req}</label><input class="field" id="f_last" value="${S.data.last}"></div></div>
      <label class="lab">Email${req}</label><input class="field" id="f_email" value="${S.data.email}" placeholder="you@email.com">
      <label class="lab">Phone Number${req}</label>
      <div class="two" style="gap:10px"><div style="flex:0 0 42%"><select class="sel" id="f_cc">${opts}</select></div>
        <div style="flex:1"><input class="field" id="f_phone" value="${S.data.phone}" placeholder="803 123 4567"></div></div>
      <div id="phoneErr"></div>
      <label class="lab">City/locality you live in${req}</label><input class="field" id="f_city" value="${S.data.city}" placeholder="Lagos, Nigeria">
      <label class="lab">Program Type</label><select class="sel"><option>Degree</option></select>
      <div class="consent"><span class="cb">✓</span><span>By submitting this form, I agree to Nexford University's <a class="lk">Terms &amp; Conditions</a> and <a class="lk">Privacy Policy</a>, and consent to receive communications from Nexford University.</span></div>
      <button class="primary" id="submit">Register Now</button>
      <p class="ret">Returning to your application? <a>Login</a></p>
    </div></div>
  </div>
  <div class="reg-right" style="padding-top:0"><div style="max-width:500px;width:100%"><div class="pixel" id="pixel"></div></div></div>
  ${note(b?'The phone selector offers 245 countries but the backend rejects some (e.g. Ukraine +380). Submitting returns a generic “An error occurred.” Conversion pixels fire even on the failed submit; required fields aren’t marked. <b>(C1 + C2)</b>':'Unsupported countries are <b>disabled with a reason</b>, validation is <b>field-level and focuses the first error</b>, required fields are marked, and <b>pixels fire only on success</b>. <b>(C1 + C2)</b>')}`;
  setChat('corner');
  $('#google').onclick=()=>{S.data.name=S.data.name||'Fatih';go('verify');if(!b)setTimeout(()=>toast('Welcome, '+(S.data.name)+' — signed in with Google ✓',true),150);};
  const sync=()=>{S.data.name=$('#f_name').value;S.data.last=$('#f_last').value;S.data.email=$('#f_email').value;S.data.cc=$('#f_cc').value;S.data.phone=$('#f_phone').value;S.data.city=$('#f_city').value;};
  $('#f_cc').onchange=e=>S.data.cc=e.target.value;
  $('#submit').onclick=()=>{sync();const c=COUNTRIES.find(x=>x.c===S.data.cc);
    if(b){$('#pixel').innerHTML='<span class="bad">🔴 conversion pixel fired</span> — on submit, before the result is known';
      if(c&&!c.ok){toast('An error occurred. Please try again.');return;} go('verify');
    } else {let bad=null;[['f_name',S.data.name],['f_last',S.data.last],['f_email',S.data.email],['f_phone',S.data.phone],['f_city',S.data.city]].forEach(([id,v])=>{const el=$('#'+id);el.classList.toggle('bad',!v);if(!v&&!bad)bad=el;});
      if(S.data.email&&!/.+@.+\..+/.test(S.data.email)){$('#f_email').classList.add('bad');bad=bad||$('#f_email');}
      if(c&&!c.ok){$('#phoneErr').innerHTML='<div class="ferr">⚠ Nexford can’t accept phone numbers from '+c.n+' yet. Try another number, or see supported countries.</div>';$('#f_cc').classList.add('bad');bad=bad||$('#f_cc');}
      if(bad){bad.scrollIntoView({behavior:'smooth',block:'center'});bad.focus({preventScroll:true});$('#pixel').innerHTML='<span class="bad">no pixel</span> — blocked at the client, nothing counted';return;}
      $('#pixel').innerHTML='<span class="ok">✅ conversion pixel fired</span> — only after a 2xx success';go('verify');}
  };
}

/* ---------- VERIFY ---------- */
function verify(){
  $('#app').className='gray';
  $('#app').innerHTML=`<div class="done-wrap"><div class="card auth" style="text-align:center">
    <h2 class="h2" style="text-align:center">Verify your email</h2>
    <p class="sub">We sent a 6-digit code to <b style="color:#1a1a1a">${S.data.email||'you@email.com'}</b></p>
    <div style="display:flex;justify-content:center;gap:8px">${[...Array(6)].map((_,i)=>`<input class="field" maxlength="1" style="text-align:center;font-size:20px;width:46px" id="o${i}">`).join('')}</div>
    <button class="primary" id="v">Verify &amp; continue</button></div></div>
    ${note(S.mode==='broken'?'Works — but the Google path also lands here re-typing details.':'The Google path <b>skips this step</b>; codes auto-advance and accept paste.')}`;
  setChat('corner');
  const bx=[...document.querySelectorAll('#app .field')];bx.forEach((b,i)=>b.oninput=()=>{if(b.value&&bx[i+1])bx[i+1].focus();});bx[0]&&bx[0].focus();
  $('#v').onclick=()=>go('education');
}

/* ---------- EDUCATION ---------- */
function education(){
  $('#app').className='gray';
  const card=`<h2 class="h2">Previous education</h2><p class="sub" style="text-align:left;margin-bottom:18px">Tell us about your most recent qualification</p>
    <label class="lab">Highest level</label><select class="sel"><option>Bachelor’s degree</option><option>Master’s degree</option></select>
    <label class="lab">Field of study</label><input class="field" value="Business Administration">
    <label class="lab">Institution</label><input class="field" placeholder="Type to search…" value="University of Lagos">
    <label class="lab">Year completed</label><input class="field" value="2018">
    <button class="primary auto" id="n">Save &amp; Continue</button>`;
  $('#app').innerHTML=innerChrome('education',card,note(S.mode==='broken'?'Institution is a search dropdown with no results hint.':'Institution search suggests as you type; country auto-detected for later steps.'));
  setChat('corner');$('#n').onclick=()=>go('personal');
}

/* ---------- PERSONAL ---------- */
function personal(){
  const b=S.mode==='broken';const req=b?'':' <span class="req">*</span>';
  const fields=b?['Date of Birth','Gender','Nationality','Country','Address','Address (Line 2)','State/province','Postal code','Native English speaker','How did you hear about us']
                :['Date of Birth','Gender','Nationality','Country','Address','Postal code'];
  const card=`<h2 class="h2">Personal information</h2><p class="sub" style="text-align:left;margin-bottom:18px">${b?'14+ fields — some repeat what you already gave':'Trimmed to what “App complete” actually needs'}</p>
    <label class="lab">First Name</label><input class="field" value="${S.data.name||'Fatih'}">
    ${fields.map((f,i)=>`<label class="lab">${f}${(f.includes('Optional')||f.includes('Line 2'))?'':req}</label><input class="field" id="p${i}" ${i===0?'':'value="—"'}>`).join('')}
    ${b?'<label class="lab">+ 8 more fields…</label><input class="field" disabled value="(scroll down)">':''}
    <button class="primary auto" id="n">Save &amp; Continue</button><div id="pend"></div>`;
  $('#app').innerHTML=innerChrome('personal',card,note(b?'No required markers; on this long step the error can land <b>below the fold</b> with no scroll — “Save &amp; Continue” feels broken. <b>(V-UX)</b>':'Required fields marked; on submit we <b>scroll to and focus the first error</b>; the list is trimmed &amp; prefilled. <b>(V-UX + form-trim)</b>'));
  setChat('corner');
  $('#n').onclick=()=>{const f=$('#p0');if(!f.value){if(b){$('#pend').innerHTML='<div class="ferr" style="margin-top:14px">⚠ Date of Birth is required.</div>';toast('Nothing happened? The error is at the bottom of the form.');return;}else{f.classList.add('bad');f.scrollIntoView({behavior:'smooth',block:'center'});f.focus({preventScroll:true});f.insertAdjacentHTML('afterend','<div class="ferr">⚠ Date of Birth is required.</div>');return;}}go('identity');};
}

/* ---------- IDENTITY ---------- */
function identity(){
  const b=S.mode==='broken';
  const front=S.front?`<div class="slot ok">✓ Front added<small>${b?'photo.jpg':'id.pdf → converted to image'}</small></div>`:`<div class="slot" id="sFront">Click to upload ID (front)<small>${b?'.png .jpg .jpeg · max 10MB':'PDF, HEIC, or large photo — we convert it'}</small></div>`;
  const back=b?'':(S.back?`<div class="slot ok">✓ Back added<small>id-back.heic → image</small></div>`:`<div class="slot" id="sBack">Click to upload ID (back)<small>required for two-sided IDs</small></div>`);
  const can=b?S.front:(S.front&&S.back);
  const card=`<h2 class="h2">Identity documents</h2><p class="sub" style="text-align:left;margin-bottom:16px">Government ID · <span class="lk" id="ex">See example${b?'':' (🇳🇬 NIMC ID, Passport)'}</span></p>
    ${b?'':'<div class="hint">Government ID for 🇳🇬 Nigeria: NIMC ID, International Passport, Voter’s ID.</div>'}
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">${front}${back}</div><div id="upmsg"></div>
    <label class="lab">Selfie</label><div class="slot" id="sSelfie">${b?'Upload a selfie (.jpg/.png)':'Take a photo or upload — any format'}</div>
    <button class="primary auto" id="n" ${can?'':'style="opacity:.45"'}>Continue to payment</button>`;
  $('#app').innerHTML=innerChrome('identity',card,note(b?'Uploads accept only png/jpg ≤10MB — a <b>PDF is rejected</b> with a small toast; HEIC/large fail too. <b>One image is accepted</b> (no front/back). Example is US-style. <b>(F-files, F9, F7)</b>':'We <b>normalize on the client</b> — PDF→image, HEIC decode, compress (simulated) — so any file works; <b>Front &amp; Back enforced</b>; example localized. <b>(F-files, F9, F7)</b>'));
  setChat('corner');
  $('#ex').onclick=()=>toast(b?'Example: a US driver’s license (shown to everyone).':'Example localized to Nigeria ✓',!b);
  const uf=()=>{if(b){toast('The following files are not supported: id.pdf');$('#upmsg').innerHTML='<div class="hint">Tip: only .png/.jpg under 10MB. Double-click to add a JPG and proceed.</div>';}else{S.front=true;toast('id.pdf → converted &amp; compressed to image ✓',true);render();}};
  $('#sFront')&&($('#sFront').onclick=uf);
  if(b&&!S.front){const s=$('#sFront');if(s)s.ondblclick=()=>{S.front=true;toast('photo.jpg added ✓',true);render();};}
  $('#sBack')&&($('#sBack').onclick=()=>{S.back=true;toast('id-back.heic → converted to image ✓',true);render();});
  $('#sSelfie')&&($('#sSelfie').onclick=()=>toast(b?'selfie.heic not supported':'Selfie captured ✓',!b));
  $('#n').onclick=()=>{if(!can){toast(b?'Please add your ID.':'Please add both the front and back of your ID.');return;}go('checkout');};
}

/* ---------- CHECKOUT ---------- */
function checkout(){
  const b=S.mode==='broken';if(!S.pay)S.pay=b?'usd':'ngn';
  const pills=b?`<div class="pill ${S.pay==='usd'?'sel':''}" data-p="usd">Pay in USD — Card</div><div class="pill ${S.pay==='paypal'?'sel':''}" data-p="paypal">PayPal (USD)</div><div class="pill ${S.pay==='wire'?'sel':''}" data-p="wire">Bank transfer (USD)</div>`
    :`<div class="pill ${S.pay==='ngn'?'sel':''}" data-p="ngn">🇳🇬 Pay in NGN — Paystack</div><div class="pill ${S.pay==='momo'?'sel':''}" data-p="momo">Mobile money</div><div class="pill ${S.pay==='usd'?'sel':''}" data-p="usd">Card (USD)</div><div class="pill ${S.pay==='wire'?'sel':''}" data-p="wire">Bank transfer</div>`;
  const card=`<h2 class="h2">Application fee</h2><p class="sub" style="text-align:left;margin-bottom:14px">Please pay your non-refundable application fee</p>
    <div class="sumrow"><span>Application Fee</span><span>$25.00</span></div><div class="sumrow big"><span>Balance</span><span>$25.00</span></div>
    <label class="lab">Select your preferred option</label><div class="pills" id="pills">${pills}</div>
    ${S.pay==='usd'?`<label class="lab">Card number</label><input class="field" placeholder="1234 5678 9012 3456">
      <div class="two"><div><label class="lab">Expiration</label><input class="field" placeholder="MM / YY"></div>
      <div><label class="lab">CVC</label><div class="cvcwrap"><input class="field" placeholder="•••" id="cvc"></div></div></div>`:''}
    ${S.pay==='wire'?`<div class="banknote">${b?'Beneficiary: <b>Bank of America, 222 Broadway</b><br>SWIFT: BOFAUS3N · <span style="color:#c0392b">⚠ the emailed invoice says “Bank of New York, 22 Broadway” — conflicting</span>':'Beneficiary: <b>Bank of America, 222 Broadway</b><br>SWIFT: BOFAUS3N · <span style="color:#2f8659">✓ identical on checkout, invoice &amp; email</span>'}</div>`:''}
    ${S.pay==='ngn'?'<div class="hint ok">Pay ₦ with your Nigerian card or bank — no USD/international block.</div>':''}
    ${S.pay==='momo'?'<div class="hint ok">Pay via mobile money — no card needed.</div>':''}
    <button class="primary auto" id="pay">Make payment &amp; apply</button>`;
  $('#app').innerHTML=innerChrome('checkout',card,note(b?'Every option is <b>USD</b> (cards restricted to local currency fail). Wire details <b>differ between checkout and invoice</b>. <b>(USD-only + F14)</b>':'A <b>local rail (₦ Paystack / mobile money)</b> is offered first; wire details are a <b>single source of truth</b>. <b>(local rails + F14)</b>'));
  // chat overlap only in broken+usd; otherwise corner (fixed moves it away)
  setChat('corner');
  document.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{S.pay=p.dataset.p;render();});
  $('#pay').onclick=()=>go('done');
}

/* ---------- DONE ---------- */
function done(){
  $('#app').className='gray';
  $('#app').innerHTML=`<div class="done-wrap"><div class="card auth done">
    <div class="big">🎉</div><h2 class="h2" style="text-align:center">Application complete</h2>
    <p class="sub">Your $25 application fee is paid. <b style="color:#2f8659">App complete.</b></p>
    <div class="sumrow"><span>Status</span><span style="color:#2f8659;font-weight:700">Paid ✓</span></div>
    <div class="sumrow"><span>⏱ Time to complete <span style="color:#8b8b8b;font-weight:400">(est.)</span></span><span style="font-weight:700;color:${S.mode==='broken'?'#c0392b':'#2f8659'}">${S.mode==='broken'?'~16 min':'~8 min'}</span></div>
    <div class="sumrow"><span>Reference</span><span>NXU-2285</span></div>
    <a class="replay" id="again">↻ Replay the flow</a></div></div>
    ${note(S.mode==='broken'?'You made it — but only by working around a dead-end, a file wall and a USD-only checkout. Many applicants wouldn’t — and it took <b>~16 min</b>, past the promised “less than 10.”':'Every friction point above was removed or de-risked — the same applicant reaches “paid” with nothing in the way, in <b>~8 min</b>, under the “less than 10 minutes” promise.')}`;
  setChat('corner');
  $('#again').onclick=()=>{S.front=S.back=false;S.pay=null;go('register');};
}

const R={register,verify,education,personal,identity,checkout,done};
function renderToggle(){document.querySelectorAll('#toggle button').forEach(b=>{b.classList.toggle('on',b.dataset.m===S.mode);b.classList.add(b.dataset.m);b.onclick=()=>{S.mode=b.dataset.m;render();};});}
function render(){renderToggle();(R[S.step]||register)();}
render();
</script>
